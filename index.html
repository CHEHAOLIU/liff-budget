<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>預算設定</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- JS -->
  <script src="app.js" defer></script>

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background-color: #f8f9fa;
    }

    /* ⭐ scroll 區 */
    #form {
      max-height: 1200px;
      overflow-y: auto;
      background: white;
    }

    /* ⭐ 財報風數字 */
    .amount-input {
      width: 120px;
      text-align: right;
      font-family: monospace;
    }

    /* ⭐ 類別字 */
    .category-label {
      font-weight: 500;
    }
  </style>
</head>

<body>

  <div class="container app-container">

    <h4 class="mb-3">💰 預算設定</h4>

    <div id="form" class="budget-grid border rounded p-2"></div>

    <div class="d-flex justify-content-between mt-3">
      <strong>總預算</strong>
      <strong id="total">0</strong>
    </div>

    <button class="btn btn-primary w-100 mt-3" onclick="submitBudget()">儲存預算</button>

    <div id="status" class="mt-2 text-center text-success"></div>

  </div>

</body></html>
